{% extends 'base.html' %}
{% load static %}

{% block title %}Admin Registration | Auraa Crackers{% endblock %}

{% block content %}
<div class="min-h-screen pt-32 pb-20 px-4 bg-gray-50 flex items-center justify-center">
    <div class="max-w-xl w-full">
        <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-gray-100">
            <div class="p-12 md:p-16">
                <div class="text-center mb-12">
                    <h1 class="text-4xl font-black text-gray-900 tracking-tight uppercase mb-4">Admin <span class="text-auraa-red">Registration</span></h1>
                    <p class="text-gray-500 font-bold uppercase tracking-widest text-[10px]">Create an administrative account</p>
                </div>

                <form id="admin-register-form" class="space-y-6">
                    {% csrf_token %}
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-4">Username</label>
                            <input type="text" name="username" required
                                   class="w-full px-8 py-5 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-auraa-red font-bold text-sm text-gray-900 placeholder-gray-300 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-4">Full Name</label>
                            <input type="text" name="full_name" required
                                   class="w-full px-8 py-5 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-auraa-red font-bold text-sm text-gray-900 placeholder-gray-300 transition-all">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-4">Mobile Number</label>
                            <input type="text" name="mobile" required
                                   class="w-full px-8 py-5 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-auraa-red font-bold text-sm text-gray-900 placeholder-gray-300 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-4">Email ID</label>
                            <input type="email" name="email" required
                                   class="w-full px-8 py-5 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-auraa-red font-bold text-sm text-gray-900 placeholder-gray-300 transition-all">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-4">Password</label>
                        <input type="password" name="password" required
                               class="w-full px-8 py-5 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-auraa-red font-bold text-sm text-gray-900 placeholder-gray-300 transition-all">
                    </div>

                    <button type="submit" class="w-full py-6 bg-gray-900 text-white rounded-[2rem] font-black uppercase tracking-[0.2em] text-[11px] shadow-2xl hover:bg-auraa-red transition-all transform hover:-translate-y-2 active:scale-95 duration-500 mt-8">
                        REGISTER ADMIN
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('admin-register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        
        try {
            const res = await fetch("{% url 'api_admin_register' %}", {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}'
                }
            });
            const data = await res.json();
            
            if (data.status === 'success') {
                showModal('Success!', data.message, 'success', 'Go to Login', () => {
                    location.href = "{% url 'login' %}";
                });
            } else {
                showModal('Registration Error', data.message, 'error');
            }
        } catch (err) {
            console.error(err);
        }
    });
</script>
{% endblock %}
