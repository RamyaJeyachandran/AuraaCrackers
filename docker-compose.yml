services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-auraacrackers}
      - POSTGRES_USER=${DB_USER:-auraauser}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-auraapass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  web:
    build: .
    environment:
      - DEBUG=True
      - DB_NAME=${DB_NAME:-auraacrackers}
      - DB_USER=${DB_USER:-auraauser}
      - DB_PASSWORD=${DB_PASSWORD:-auraapass}
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CACHE_URL=redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  celery_worker:
    build: .
    command: celery -A config worker --loglevel=info --concurrency=4
    environment:
      - DB_NAME=${DB_NAME:-auraacrackers}
      - DB_USER=${DB_USER:-auraauser}
      - DB_PASSWORD=${DB_PASSWORD:-auraapass}
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CACHE_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  celery_beat:
    build: .
    command: celery -A config beat --loglevel=info
    environment:
      - DB_NAME=${DB_NAME:-auraacrackers}
      - DB_USER=${DB_USER:-auraauser}
      - DB_PASSWORD=${DB_PASSWORD:-auraapass}
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CACHE_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  flower:
    build: .
    command: celery -A config flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  nginx:
    build: ./nginx
    ports:
      - "8080:80"
    volumes:
      - ./static:/var/www/static
      - ./media:/var/www/media
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
  redis_data:
