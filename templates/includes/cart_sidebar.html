<!-- Cart Sidebar -->
<div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full sm:w-96 bg-white z-[100001] transform translate-x-full transition-transform duration-500 shadow-2xl flex flex-col">
    <!-- Header -->
    <div class="px-6 py-6 border-b border-gray-100 flex items-center justify-between bg-gray-900 text-white">
        <h2 class="text-lg font-black uppercase tracking-tight">Your Cart</h2>
        <button onclick="toggleCartSidebar()" class="p-2 hover:bg-white/10 rounded-full transition-colors">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
    </div>

    <!-- Items -->
    <div id="cart-items-container" class="flex-grow overflow-y-auto p-6 space-y-6">
        <!-- Cart items will be injected here via JS -->
    </div>

    <!-- Summary & Actions -->
    <div class="p-6 bg-gray-50 border-t border-gray-100 space-y-4">
        <div class="space-y-2">
            <div class="flex justify-between text-sm">
                <span class="text-gray-500 font-medium">Net Total</span>
                <span id="cart-net-total" class="font-bold text-gray-900">₹ 0.00</span>
            </div>
            <div class="flex justify-between text-sm">
                <span class="text-gray-500 font-medium">Discount Total</span>
                <span id="cart-discount-total" class="font-bold text-green-600">₹ 0.00</span>
            </div>
            <div class="flex justify-between text-lg border-t border-gray-200 pt-2">
                <span class="font-black uppercase tracking-tight text-gray-900">Sub Total</span>
                <span id="cart-sub-total" class="font-black text-gray-900">₹ 0.00</span>
            </div>
            <div class="flex justify-between text-xl font-black pt-1">
                <span class="uppercase tracking-tight text-gray-900">Overall Amount</span>
                <span id="cart-overall-total" class="text-auraa-red">₹ 0.00</span>
            </div>
        </div>

        <!-- Min Order accordion -->
        <div class="bg-red-50 rounded-2xl border border-red-100 overflow-hidden">
            <button onclick="toggleMinOrder()" class="w-full p-4 flex items-center justify-between text-left group">
                <h4 class="text-[10px] font-black uppercase tracking-widest text-auraa-red">Min. Order Amount</h4>
                <i data-lucide="chevron-down" id="min-order-chevron" class="w-4 h-4 text-auraa-red transition-transform duration-300"></i>
            </button>
            <div id="min-order-details" class="max-h-0 overflow-hidden transition-all duration-300 ease-in-out">
                <div class="px-4 pb-4 grid grid-cols-2 gap-x-4 gap-y-1 text-[11px]">
                    <span class="text-red-800/70">Tamil Nadu</span>
                    <span class="text-red-800 font-bold text-right">Rs.3000</span>
                    <span class="text-red-800/70">Pondicherry</span>
                    <span class="text-red-800 font-bold text-right">Rs.3000</span>
                    <span class="text-red-800/70">Andhra Pradesh</span>
                    <span class="text-red-800 font-bold text-right">Rs.3000</span>
                    <span class="text-red-800/70">Kerala</span>
                    <span class="text-red-800 font-bold text-right">Rs.3000</span>
                    <span class="text-red-800/70">Karnataka</span>
                    <span class="text-red-800 font-bold text-right">Rs.3000</span>
                </div>
            </div>
        </div>

        <script>
            function toggleMinOrder() {
                const details = document.getElementById('min-order-details');
                const chevron = document.getElementById('min-order-chevron');
                
                if (details.style.maxHeight && details.style.maxHeight !== '0px') {
                    details.style.maxHeight = '0px';
                    chevron.style.transform = 'rotate(0deg)';
                } else {
                    details.style.maxHeight = details.scrollHeight + 'px';
                    chevron.style.transform = 'rotate(180deg)';
                }
            }
        </script>

        <button id="confirm-estimate-btn" onclick="handleSidebarCheckout()" class="w-full bg-auraa-red text-white py-5 rounded-2xl font-black uppercase tracking-widest text-sm shadow-xl shadow-auraa-red/20 hover:bg-gray-900 transition-all active:scale-[0.98]">
            Place Order
        </button>
    </div>
</div>

<!-- Backdrop -->
<div id="cart-backdrop" class="fixed inset-0 bg-black/50 z-[100000] hidden opacity-0 transition-opacity duration-500" onclick="toggleCartSidebar()"></div>
