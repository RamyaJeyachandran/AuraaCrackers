<div id="hover-zoom-modal" class="hidden fixed inset-0 z-[9999] flex items-center justify-center p-4 md:p-8">
    <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" onclick="hideZoom()"></div>
    
    <div class="relative max-w-5xl max-h-[90vh] w-auto bg-black rounded-3xl overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.5)] transition-all scale-95 opacity-0 duration-300 flex flex-col" id="zoom-container">
        <!-- Close Button -->
        <button onclick="hideZoom()" class="absolute top-6 right-6 z-20 p-3 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-full text-white transition-all">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>

        <!-- Image Content -->
        <div class="flex-1 flex items-center justify-center overflow-hidden bg-zinc-900/30">
            <img id="zoom-img-content" src="" alt="Zoom" class="max-w-full max-h-[75vh] object-contain shadow-2xl">
        </div>

        <!-- Title / Caption -->
        <div class="p-8 bg-zinc-950 border-t border-white/5">
            <h3 id="zoom-title" class="text-2xl md:text-3xl font-black text-white uppercase tracking-tight text-center">Product Name</h3>
        </div>
    </div>
</div>

<script>
    function showZoom(img, title) {
        const modal = document.getElementById('hover-zoom-modal');
        const container = document.getElementById('zoom-container');
        const imgContent = document.getElementById('zoom-img-content');
        const titleContent = document.getElementById('zoom-title');

        imgContent.src = img;
        titleContent.innerText = title;
        modal.classList.remove('hidden');
        
        // Trigger animation
        setTimeout(() => {
            container.classList.remove('scale-95', 'opacity-0');
            container.classList.add('scale-100', 'opacity-100');
        }, 10);
        
        if (window.lucide) lucide.createIcons();
    }

    function hideZoom() {
        const modal = document.getElementById('hover-zoom-modal');
        const container = document.getElementById('zoom-container');
        
        container.classList.add('scale-95', 'opacity-0');
        container.classList.remove('scale-100', 'opacity-100');
        
        setTimeout(() => {
            modal.classList.add('hidden');
        }, 300);
    }
</script>
